backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

site_url: https://eadar-web.netlify.app

# 发布模式：简单编辑工作流
publish_mode: simple

# CMS 集合配置
collections:
  # 新闻文章 - 存储在 content/news 目录
  - name: "news"
    label: "新闻文章"
    folder: "content/news"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - label: "标题"
        name: "title"
        widget: "string"
        required: true
      - label: "发布日期"
        name: "date"
        widget: "datetime"
        required: true
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
      - label: "摘要"
        name: "description"
        widget: "text"
        required: false
      - label: "封面图片"
        name: "image"
        widget: "image"
        required: false
      - label: "正文内容"
        name: "body"
        widget: "markdown"
        required: true

  # 页面内容 - 中文
  - name: "pages"
    label: "页面内容 (中文)"
    files:
      - name: "homepage"
        label: "首页"
        file: "content/pages/homepage.md"
        fields:
          - {label: "页面标题", name: "title", widget: "string"}
          - {label: "Meta描述", name: "description", widget: "text"}
          - {label: "页面内容", name: "body", widget: "markdown"}
      - name: "about"
        label: "关于我们"
        file: "content/pages/about.md"
        fields:
          - {label: "页面标题", name: "title", widget: "string"}
          - {label: "Meta描述", name: "description", widget: "text"}
          - {label: "页面内容", name: "body", widget: "markdown"}
      - name: "services"
        label: "服务页面"
        file: "content/pages/services.md"
        fields:
          - {label: "页面标题", name: "title", widget: "string"}
          - {label: "Meta描述", name: "description", widget: "text"}
          - {label: "页面内容", name: "body", widget: "markdown"}
      - name: "contact"
        label: "联系我们"
        file: "content/pages/contact.md"
        fields:
          - {label: "页面标题", name: "title", widget: "string"}
          - {label: "Meta描述", name: "description", widget: "text"}
          - {label: "页面内容", name: "body", widget: "markdown"}
      - name: "news"
        label: "新闻中心"
        file: "content/pages/news.md"
        fields:
          - {label: "页面标题", name: "title", widget: "string"}
          - {label: "Meta描述", name: "description", widget: "text"}
          - {label: "页面内容", name: "body", widget: "markdown"}

  # 页面内容 - 英文
  - name: "pages_en"
    label: "页面内容 (English)"
    files:
      - name: "homepage_en"
        label: "Home"
        file: "content/pages/en/homepage.md"
        fields:
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "description", widget: "text"}
          - {label: "Page Content", name: "body", widget: "markdown"}
      - name: "about_en"
        label: "About Us"
        file: "content/pages/en/about.md"
        fields:
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "description", widget: "text"}
          - {label: "Page Content", name: "body", widget: "markdown"}
      - name: "services_en"
        label: "Services"
        file: "content/pages/en/services.md"
        fields:
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "description", widget: "text"}
          - {label: "Page Content", name: "body", widget: "markdown"}
      - name: "contact_en"
        label: "Contact Us"
        file: "content/pages/en/contact.md"
        fields:
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "description", widget: "text"}
          - {label: "Page Content", name: "body", widget: "markdown"}
      - name: "news_en"
        label: "News Center"
        file: "content/pages/en/news.md"
        fields:
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Meta Description", name: "description", widget: "text"}
          - {label: "Page Content", name: "body", widget: "markdown"}

  # 站点设置
  - name: "settings"
    label: "站点设置"
    files:
      - name: "general"
        label: "基本设置"
        file: "content/settings/general.json"
        fields:
          - {label: "网站标题", name: "site_title", widget: "string"}
          - {label: "网站描述", name: "site_description", widget: "text"}
          - {label: "联系电话", name: "phone", widget: "string"}
          - {label: "联系邮箱", name: "email", widget: "string"}
