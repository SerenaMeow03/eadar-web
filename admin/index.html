<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 谊达翻译内容管理</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-container {
            text-align: center;
            padding: 50px 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
        }
        .logo {
            width: 100px;
            margin-bottom: 24px;
        }
        h1 {
            color: #333;
            margin-bottom: 12px;
            font-size: 24px;
            font-weight: 600;
        }
        .subtitle {
            color: #666;
            margin-bottom: 32px;
            font-size: 14px;
        }
        .login-btn {
            background: linear-gradient(135deg, #4A6B8A 0%, #6B8EB5 100%);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            width: 100%;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(74, 107, 138, 0.4);
        }
        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .user-info {
            display: none;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #eee;
        }
        .user-info.show {
            display: block;
        }
        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 12px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            margin-right: auto;
            font-size: 24px;
        }
        .user-email {
            color: #333;
            font-size: 14px;
            margin-bottom: 16px;
            word-break: break-all;
        }
        .enter-cms-btn {
            background: #00ad9f;
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 12px;
        }
        .enter-cms-btn:hover {
            background: #008b7f;
            transform: translateY(-2px);
        }
        .logout-btn {
            background: transparent;
            color: #999;
            border: 1px solid #ddd;
            padding: 8px 20px;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .logout-btn:hover {
            background: #f5f5f5;
            color: #666;
        }
        .loading {
            display: none;
            margin-top: 20px;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4A6B8A;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error-message {
            display: none;
            background: #fff5f5;
            color: #e53e3e;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            margin-top: 16px;
            border: 1px solid #feb2b2;
        }
        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="../images/logo-blue.png" alt="谊达翻译" class="logo" onerror="this.style.display='none'">
        <h1>谊达翻译内容管理</h1>
        <p class="subtitle">请登录以管理网站内容</p>
        
        <button class="login-btn" id="loginBtn" onclick="handleLogin()">
            登录 / 注册
        </button>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="color: #666; font-size: 14px;">正在加载...</p>
        </div>
        
        <div class="user-info" id="userInfo">
            <div class="user-avatar">👤</div>
            <p class="user-email" id="userEmail"></p>
            <a href="cms.html" class="enter-cms-btn">进入内容管理系统</a>
            <br>
            <button class="logout-btn" onclick="handleLogout()">退出登录</button>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
    </div>

    <script>
        // 检查是否是邀请或重置链接
        const hash = window.location.hash;
        if (hash.includes('invite_token=') || hash.includes('recovery_token=') || hash.includes('confirmation_token=')) {
            window.location.href = '/admin/confirmation.html' + window.location.hash.replace('#', '?');
        }
        
        // 初始化 Netlify Identity
        if (window.netlifyIdentity) {
            netlifyIdentity.init();
            
            netlifyIdentity.on('init', user => {
                if (user) {
                    showUserInfo(user);
                }
            });
            
            netlifyIdentity.on('login', user => {
                showUserInfo(user);
                netlifyIdentity.close();
            });
            
            netlifyIdentity.on('logout', () => {
                hideUserInfo();
            });
            
            netlifyIdentity.on('error', err => {
                showError('登录过程中出现错误，请重试');
            });
        }
        
        function handleLogin() {
            if (window.netlifyIdentity) {
                showLoading(true);
                netlifyIdentity.open('login');
            }
        }
        
        function handleLogout() {
            if (window.netlifyIdentity) {
                netlifyIdentity.logout();
            }
        }
        
        function showUserInfo(user) {
            showLoading(false);
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userInfo').classList.add('show');
            document.getElementById('userEmail').textContent = user.email || '已登录用户';
        }
        
        function hideUserInfo() {
            document.getElementById('loginBtn').style.display = 'inline-block';
            document.getElementById('userInfo').classList.remove('show');
        }
        
        function showLoading(show) {
            document.getElementById('loading').classList.toggle('show', show);
            document.getElementById('loginBtn').disabled = show;
        }
        
        function showError(message) {
            showLoading(false);
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => errorEl.classList.remove('show'), 5000);
        }
    </script>
</body>
</html>
