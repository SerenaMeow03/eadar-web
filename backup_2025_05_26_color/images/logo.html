<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { margin: 0; background: white; }
    .logo-container {
      width: 400px;
      height: 120px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      box-sizing: border-box;
    }
    .logo-icon {
      width: 80px;
      height: 80px;
      position: relative;
    }
    .logo-text {
      margin-left: 20px;
    }
    .logo-name {
      font-family: Arial, sans-serif;
      font-size: 32px;
      font-weight: bold;
      color: #1e3a5f;
      letter-spacing: 1px;
    }
    .logo-tagline {
      font-family: Arial, sans-serif;
      font-size: 12px;
      color: #2d8a8a;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <svg class="logo-icon" viewBox="0 0 80 80">
      <polygon points="40,5 70,22 70,55 40,72 10,55 10,22" fill="none" stroke="#1e3a5f" stroke-width="2.5"/>
      <polygon points="40,18 58,30 58,50 40,62 22,50 22,30" fill="#2d8a8a" opacity="0.85"/>
      <circle cx="40" cy="40" r="7" fill="#1e3a5f"/>
      <line x1="40" y1="5" x2="40" y2="18" stroke="#1e3a5f" stroke-width="1.5"/>
      <line x1="70" y1="22" x2="58" y2="30" stroke="#1e3a5f" stroke-width="1.5"/>
      <line x1="70" y1="55" x2="58" y2="50" stroke="#1e3a5f" stroke-width="1.5"/>
      <line x1="40" y1="72" x2="40" y2="62" stroke="#1e3a5f" stroke-width="1.5"/>
      <line x1="10" y1="55" x2="22" y2="50" stroke="#1e3a5f" stroke-width="1.5"/>
      <line x1="10" y1="22" x2="22" y2="30" stroke="#1e3a5f" stroke-width="1.5"/>
    </svg>
    <div class="logo-text">
      <div class="logo-name">Eadartrans</div>
      <div class="logo-tagline">(Wuhan) Co., Ltd.</div>
    </div>
  </div>
</body>
</html>
