<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Background -->
  <rect width="400" height="120" fill="#ffffff"/>
  
  <!-- Logo Icon - Abstract geometric shape -->
  <g transform="translate(30, 20)">
    <!-- Outer hexagon -->
    <polygon points="40,5 75,25 75,60 40,80 5,60 5,25" fill="none" stroke="#1e3a5f" stroke-width="3"/>
    
    <!-- Inner geometric shape -->
    <polygon points="40,20 60,32 60,55 40,67 20,55 20,32" fill="#2d8a8a" opacity="0.8"/>
    
    <!-- Center dot -->
    <circle cx="40" cy="42" r="8" fill="#1e3a5f"/>
    
    <!-- Connection lines suggesting tech/network -->
    <line x1="40" y1="5" x2="40" y2="20" stroke="#1e3a5f" stroke-width="2"/>
    <line x1="75" y1="25" x2="60" y2="32" stroke="#1e3a5f" stroke-width="2"/>
    <line x1="75" y1="60" x2="60" y2="55" stroke="#1e3a5f" stroke-width="2"/>
    <line x1="40" y1="80" x2="40" y2="67" stroke="#1e3a5f" stroke-width="2"/>
    <line x1="5" y1="60" x2="20" y2="55" stroke="#1e3a5f" stroke-width="2"/>
    <line x1="5" y1="25" x2="20" y2="32" stroke="#1e3a5f" stroke-width="2"/>
  </g>
  
  <!-- Company Name -->
  <text x="130" y="55" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#1e3a5f">EADAR</text>
  
  <!-- Tagline -->
  <text x="130" y="80" font-family="Arial, sans-serif" font-size="14" fill="#2d8a8a">Technology Solutions</text>
</svg>